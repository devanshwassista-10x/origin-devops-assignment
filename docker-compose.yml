services:
  generator:
    build: ./generator
    container_name: generator
    environment:
      - PROXY_URL=http://proxy:8080
      - PUSH_BATCH_INTERVAL_SEC=0.2
      - LOG_PATH=/logs/generator.log
    volumes:
      - ./logs:/logs
    depends_on:
      proxy:
        condition: service_healthy
    restart: on-failure

  proxy:
    build: ./proxy
    container_name: proxy
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://victoriametrics:8428
      - MEMORY_LIMIT_MIB=150
    mem_limit: 150m
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=1d"
      - "--httpListenAddr=:8428"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - victoriametrics
    restart: unless-stopped

volumes:
  vm_data:
  grafana_data:
